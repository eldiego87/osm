<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Control de Purificación de Agua</title>
    <style>
body { 
            font-family: Arial, sans-serif; 
            padding: 20px; 
            background-color: white; /* Para asegurar un fondo blanco sólido detrás */
            margin: 0; /* Eliminar márgenes por defecto */
        }
        .header {
            width: 100%;
            text-align: left; /* Alinear la imagen a la derecha */
        }
        .header img {
            width: auto; /* Mantener el tamaño original de la imagen */
            height: auto; /* Mantener el tamaño original de la imagen */
        }
        .form-group { margin-bottom: 15px; position: relative; z-index: 1; } /* Traer los campos de formulario al frente */
        .form-row {
            display: flex;
            gap: 20px; /* Espacio entre los elementos */
            align-items: center; /* Alinear verticalmente los elementos */
        }
        .form-row .form-group {
            flex: 1; /* Permite que los elementos tengan el mismo ancho */
        }
        label { display: block; margin-bottom: 5px; }
        input[type="text"], input[type="number"], input[type="date"], input[type="time"] { width: 100%; padding: 8px; }
        button { padding: 10px 15px; margin-right: 10px; background-color: #007BFF; color: #fff; border: none; cursor: pointer; }
        #signature-pad, #apellido-pad { 
            border: 1px solid #ddd; 
            margin-top: 15px; 
            width: 100%; 
            height: 156px; /* 30% más alto que la altura original de 120px */
            touch-action: none; 
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
</head>
<body>
    <div class="header">
        <img src="encabezado.jpg" alt="Encabezado">
    </div>
    <h1></h1>
    <form id="formulario">
      <div class="form-row">
        <div class="form-group">
            <label for="fecha">Fecha:</label>
            <input type="date" id="fecha" required>
        </div>
        <div class="form-group">
            <label for="hora">Hora:</label>
            <input type="time" id="hora" required>
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label for="nombreEmpresa">Empresa:</label>
            <input type="text" id="nombreEmpresa" required>
                <select id="empresaINPUT">
                <option value=""></option>
                <option value="NEFROLOGÍA ARGENTINA">NEFRO ARGENTINA</option>
                <option value="ITAC - NEPHROLOGY">ITAC - NEPHROLOGY</option>
                <option value="CLÍNICA SAN CAMILO">ITAC - CLÍNICA SAN CAMILO</option>
                <option value="HOSPITAL MILITAR CENTRAL">ITAC - HOSPITAL MILITAR CENTRAL</option>
                <option value="SANATORIO GÜEMES">ITAC - SAN CAMILO</option>
                </select>
        </div>
        </div>
        <div class="form-group">
            <label for="nombreClinica">Nombre de la Clínica:</label>
            <input type="text" id="nombreClinica" required>
            <div class="form-group"></div>
 
                <select id="nefroargINPUT">
                <option value="">NEFRO ARG</option>
                <option value="IMDE LANÚS">LANÚS</option>
                <option value="IMDE GUERNICA">GUERNICA</option>
                <option value="NEFROLOGÍA AVELLANEDA - QUILMES">QUILMES</option>
                <option value="NEFROLOGÍA HAEDO">HAEDO</option>
                <option value="WEST NEPHROLOGY">WEST</option>
                <option value="NEFROMAT - ESPAÑOL">HTAL ESPAÑOL</option>
                <option value="NEFROMAT - SAN CRISTOBAL">FUNES</option>
                <option value="NEFROMAT - GUEMES">GÜEMES</option>
                </select>            
 
                <select id="itacINPUT">
                <option value="">ITAC</option>
                <option value="OSMOSIS 1">OSMOSIS 1</option>
                <option value="OSMOSIS 2">OSMOSIS 2</option>
                <option value="OSMOSIS 3">OSMOSIS 3</option>
                <option value="REPROCESADORA DE ENDOSCOPIA 6°">REPRO ENDOSCOPIA</option>
                <option value="AUTOCLAVES 7° ">AUTOCLAVES</option>
                <option value="TERMODESINFECTADORA MATACHANA 7°">LAVADORA</option>
               </select>            
 
                <select id="sancaINPUT">
                <option value="">SAN CAMILO</option>
                <option value="OSMOSIS TP100">TP100</option>
                <option value="OSMOSIS COMPACTA">OSMOSIS COMP</option>
                <option value="ESTERILIZACIÓN">ESTERILIZACIÓN</option>
               </select>            
 
                <select id="militarINPUT">
                <option value="">MILITAR</option>
                <option value="SERVICIO DE DIALISIS">DIALISIS</option>
               </select>
               
        </div> 
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label for="pressBomba">Presión Bomba Presurizadora:</label>
            <input type="number" id="pressBomba" required>
        </div>
        <div class="form-group">
            <label for="pressFS">Presion de Salida Filtro de Sedimentos:</label>
            <input type="number" id="pressFS" required>
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label for="pressFCA1">Presion de Salida Filtro de Carbón Activado 1:</label>
            <input type="number" id="pressFCA1" required>
        </div>
        <div class="form-group">
            <label for="pressFCA2">Presion de Salida Filtro de Carbón Activado 2:</label>
            <input type="number" id="pressFCA2" required>
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label for="pressFARC">Presion de Salida Filtro Ablandador:</label>
            <input type="number" id="pressFARC" required>
        </div>
        <div class="form-group">
            <label for="pressFDRA">Presion de Salida Filtro Desnitrificador:</label>
            <input type="number" id="pressFDRA" required>
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label for="pressFPRE">Presion de Salida Filtro Pre Osmosis:</label>
            <input type="number" id="pressFPRE" required>
        </div>
        <div class="form-group">
            <label for="pressALIM">Presion de Alimentación a Osmosis:</label>
            <input type="number" id="pressALIM" required>
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label for="pressINMEM">Presion de Entrada de Membranas de Osmosis:</label>
            <input type="number" id="pressINMEM" required>
        </div>
        <div class="form-group">
            <label for="pressOUTMEM">Presion de Salida de Membranas de Osmosis:</label>
            <input type="number" id="pressOUTMEM" required>
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label for="condIN">Conductividad de Entrada a Osmosis:</label>
            <input type="number" id="condIN" required oninput="actualizarRechazo()">
            <select id="unidadcondIN">
                <option value="µS/cm">µS</option>
                <option value="ppm">ppm</option>
            </select>
        </div>
        <div class="form-group">
            <label for="condOUT">Conductividad de Salida de Osmosis:</label>
            <input type="number" id="condOUT" required oninput="actualizarRechazo()">
            <select id="unidadcondOUT">
                <option value="µS/cm">µS</option>
                <option value="ppm">ppm</option>
           </select>
            
        </div>


        <div class="form-row">
    <div class="form-group">
        <label>Rechazo Calculado:</label>
        <span id="rechazoCalculado">---</span> %
    </div>
</div>

    </div>
    <div class="form-row">
        <div class="form-group">
            <label for="rechazo">Rechazo (%):</label>
            <input type="number" id="rechazo" required>

        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label for="caudalPERM">Caudal de Permeado de Osmosis:</label>
            <input type="number" id="caudalPERM" required>
            <select id="unidadCaudalPerm">
                <option value="L/m">L/m</option>
                <option value="L/h">L/h</option>
            </select>
            <select id="estadoCAUDAL">
            <option value=""></option>
            <option value="OK">OK</option>
            <option value="PELIGRO">PELIGRO</option>
            <option value="FALLA">FALLA</option>
            </select>
        </div>
        <div class="form-group">
            <label for="caudalCONC">Caudal de Concentrado de Osmosis:</label>
            <input type="number" id="caudalCONC" required>
            <select id="unidadCaudalConc">
                <option value="L/m">L/m</option>
                <option value="L/h">L/h</option>
            </select>
        </div>
    </div>
</div>
<div class="form-row">
            <div class="form-group">
            <label for="pressLOOP">Presión de Loop de Dialisis:</label>
            <input type="number" id="pressLOOP" required>
        </div>
        <div class="form-group">
            <label for="pressRETORNO">Presión de Loop de Dialisis:</label>
            <input type="number" id="pressRETORNO" required>
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label for="trabajoNOCTURNO">Trabajo Nocturno</label>
            <input type="text" id="trabajoNOCTURNO" required>
        </div>
        <div class="form-group">
            <label for="equipoPORTATIL">Equipo Portatil</label>
            <input type="text" id="equipoPORTATIL" required>
        </div>
    </div>
    <div class="form-row">

        
        <div class="form-group">
            <label for="UVOI">UV Osmosis</label>
            <input type="text" id="UVOI" required>
            <select id="estadoUVOI">
            <option value=""></option>
            <option value="OK">OK</option>
            <option value="FALLA">FALLA</option>
            </select>
        </div>


        <div class="form-group">
            <label for="UVLOOP">UV Loop</label>
            <input type="text" id="UVLOOP" required>
            <select id="estadoUVLOOP">
            <option value=""></option>
            <option value="OK">OK</option>
            <option value="FALLA">FALLA</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="OZONO">Ozono</label>
            <input type="text" id="OZONO" required>
            <select id="estadoOZONO">
            <option value=""></option>
            <option value="OK">OK</option>
            <option value="FALLA">FALLA</option>
            </select>
        </div>
    </div>
    <div class="form-row">
        
        <div class="form-group">
            <label for="NITRATOS">Nitratos Pre Osmosis</label>
            <input type="text" id="NITRATOS" required>
            
        </div>
        <div class="form-group">
            <label for="CLORAMINAS">Nitratos Post Osmosis</label>
            <input type="text" id="CLORAMINAS" required>
        </div>
        <div class="form-group">
            <label for="CLORO">Cloro</label>
            <input type="text" id="CLORO" required>


        </div>
        <div class="form-group">
            <label for="DUREZA">Dureza</label>
            <input type="text" id="DUREZA" required>

        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label for="comentarios">Comentarios:</label>
            <textarea id="comentarios" rows="13" cols="110"="4" placeholder="Ingrese sus comentarios aquí..."></textarea>
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label for="REEMFS">Reemplazo de Cartucho de Sedimentos</label>
            <input type="text" id="REEMFS" required>
        </div>
        <div class="form-group">
            <label for="REEMPO">Reemplazo de Cartucho Pre Osmosis</label>
            <input type="text" id="REEMPO" required>
        </div>
        <div class="form-group">
            <label for="REEMBACT">Reemplazo de Cartucho Bacteriologico</label>
            <input type="text" id="REEMBACT" required>
        </div>
        <div class="form-group">
            <label for="REEMHANSEN">Reemplazo de Conectores Hansen</label>
            <input type="text" id="REEMHANSEN" required>
        </div>
    </div>


        <!-- Área de firma -->
        <div class="form-group">
            <label for="signature-pad">Firma:</label>
            <canvas id="signature-pad"></canvas>
            <button type="button" onclick="limpiarFirma()">Limpiar Firma</button>
        </div>

        <!-- Área de apellido -->
        <div class="form-group">
            <label for="apellido-pad">Apellido:</label>
            <canvas id="apellido-pad"></canvas>
            <button type="button" onclick="limpiarApellido()">Limpiar Apellido</button>
        </div>

        <button type="button" onclick="guardarDatos()">Guardar Datos</button>
        <button type="button" onclick="exportarPDF()">Exportar a PDF</button>
    </form>

        function ajustarTamañoCanvas(canvas) {
            const ratio = Math.max(window.devicePixelRatio || 1, 1);

            // Obtener el tamaño original del canvas
            const originalWidth = canvas.offsetWidth;
            const originalHeight = canvas.offsetHeight;

            // Aumentar la altura en un 30%
            const newHeight = originalHeight * 1.30;

            // Ajustar el tamaño del canvas
            canvas.width = originalWidth * ratio;
            canvas.height = newHeight * ratio;

            // Escalar el contexto del canvas
            canvas.getContext("2d").scale(ratio, ratio);
        }

        window.addEventListener('resize', () => {
            ajustarTamañoCanvas(canvas);
            ajustarTamañoCanvas(apellidoCanvas);
        });
